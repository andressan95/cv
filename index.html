  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ist.toggle('nav-active', a.getAttribute('href').slice(1) === activeId);\n    });\n  }\n  function onScroll(){\n    if (!ticking) {\n      ticking = true;\n      requestAnimationFrame(update);\n    }\n  }\n  window.addEventListener('scroll', onScroll, { passive: true });\n  window.addEventListener('resize', onScroll);\n  window.addEventListener('load', update);\n  setTimeout(update, 300);\n})();\n<\u002Fscript>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;accent&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#2A5BD7&quot;, &quot;options&quot;: [&quot;#2A5BD7&quot;, &quot;#127C71&quot;, &quot;#0F172A&quot;, &quot;#C2410C&quot;, &quot;#7C3AED&quot;], &quot;tsType&quot;: &quot;string&quot; },\n  &quot;lang&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;es&quot;, &quot;options&quot;: [&quot;es&quot;, &quot;en&quot;], &quot;tsType&quot;: &quot;string&quot; }\n}\">\nclass Component extends DCLogic {\n  state = { lang: (this.props.lang === 'en' ? 'en' : 'es'), sent: false };\n\n  setEs = () => this.setState({ lang: 'es' });\n  setEn = () => this.setState({ lang: 'en' });\n\n  onSubmit = (e) => {\n    e.preventDefault();\n    const f = e.target;\n    const name = (f.name && f.name.value) || '';\n    const email = (f.email && f.email.value) || '';\n    const message = (f.message && f.message.value) || '';\n    const subject = encodeURIComponent('Contacto desde ideass.me — ' + name);\n    const body = encodeURIComponent(message + '\\n\\n— ' + name + '\\n' + email);\n    window.location.href = 'mailto:andres@ideass.me?subject=' + subject + '&body=' + body;\n    this.setState({ sent: true });\n    clearTimeout(this._t);\n    this._t = setTimeout(() => this.setState({ sent: false }), 5000);\n  };\n\n  dict() {\n    const es = {\n      nav: { about: 'Sobre mí', experience: 'Experiencia', skills: 'Habilidades', projects: 'Proyectos', contact: 'Contacto' },\n      hero: {\n        badge: 'Abierto a colaborar',\n        role: 'Arquitecto de Soluciones',\n        tagline: 'Ingeniero en Sistemas con más de 8 años construyendo software. Del código a la arquitectura: diseño soluciones robustas que escalan.',\n        location: 'Manta, Manabí, Ecuador 🇪🇨 · Remoto',\n        ctaContact: 'Contáctame',\n        ctaBook: 'Agenda una reunión'\n      },\n      about: {\n        kicker: 'Sobre mí', heading: 'Del código a la arquitectura',\n        p1: 'Comencé como desarrollador full stack y, durante más de cinco años, construí aplicaciones web con Angular, React, Node.js y MongoDB, entregando proyectos de alta calidad para clientes en Ecuador, Estados Unidos y más allá.',\n        p2: 'Esa base técnica me llevó a liderar proyectos y equipos. Hoy me desempeño como Arquitecto de Soluciones, diseñando sistemas escalables de principio a fin: análisis, diseño, construcción y puesta en producción.',\n        p3: 'Me apasiona mantenerme al día con la tecnología, el trabajo en equipo —presencial o remoto— y aplicar las mejores prácticas en cada entrega.',\n        s1n: '+8', s1l: 'Años de experiencia',\n        s2n: '+50', s2l: 'Proyectos entregados',\n        s3n: 'Fábrica de Software', s3l: 'AWS · Azure · Arquitectura'\n      },\n      exp: { kicker: 'Trayectoria', heading: 'Experiencia' },\n      skills: { kicker: 'Stack', heading: 'Habilidades & tecnologías' },\n      projects: { kicker: 'Trabajo', heading: 'Proyectos destacados' },\n      edu: { kicker: 'Formación', heading: 'Educación', degree: 'Ingeniería en Sistemas', school: 'Universidad Laica Eloy Alfaro de Manabí', years: '2013 – 2019' },\n      contact: {\n        kicker: 'Contacto', heading: 'Hablemos',\n        sub: '¿Tienes un proyecto o una idea en mente? Escríbeme y conversemos sobre cómo puedo ayudarte.',\n        fname: 'Nombre', phname: 'Tu nombre', femail: 'Correo', fmsg: 'Mensaje', phmsg: 'Cuéntame sobre tu proyecto…',\n        send: 'Enviar mensaje'\n      },\n      sentNote: '✓ Abriendo tu correo para enviar el mensaje…',\n      footer: 'Hecho con amor en Manta, Ecuador ♥'\n    };\n    const en = {\n      nav: { about: 'About', experience: 'Experience', skills: 'Skills', projects: 'Projects', contact: 'Contact' },\n      hero: {\n        badge: 'Open to collaborate',\n        role: 'Solutions Architect',\n        tagline: 'Systems Engineer with 8+ years building software. From code to architecture: I design robust solutions that scale.',\n        location: 'Manta, Manabí, Ecuador 🇪🇨 · Remote',\n        ctaContact: 'Get in touch',\n        ctaBook: 'Book a meeting'\n      },\n      about: {\n        kicker: 'About me', heading: 'From code to architecture',\n        p1: 'I started as a full-stack developer and, for over five years, built web applications with Angular, React, Node.js and MongoDB, delivering high-quality projects for clients across Ecuador, the United States and beyond.',\n        p2: 'That technical foundation led me to lead projects and teams. Today I work as a Solutions Architect, designing scalable systems end to end: analysis, design, build and production rollout.',\n        p3: 'I am passionate about keeping up with technology, teamwork —on-site or remote— and applying best practices in every delivery.',\n        s1n: '8+', s1l: 'Years of experience',\n        s2n: '50+', s2l: 'Projects delivered',\n        s3n: 'Software Factory', s3l: 'AWS · Azure · Architecture'\n      },\n      exp: { kicker: 'Career', heading: 'Experience' },\n      skills: { kicker: 'Stack', heading: 'Skills & technologies' },\n      projects: { kicker: 'Work', heading: 'Featured projects' },\n      edu: { kicker: 'Education', heading: 'Education', degree: 'Systems Engineering', school: 'Universidad Laica Eloy Alfaro de Manabí', years: '2013 – 2019' },\n      contact: {\n        kicker: 'Contact', heading: \"Let's talk\",\n        sub: 'Have a project or an idea in mind? Drop me a message and let’s talk about how I can help.',\n        fname: 'Name', phname: 'Your name', femail: lientes'] }\n    ];\n    const en = [\n      { role: 'Solutions Architect', company: 'iRoute Solutions', period: 'Feb 2024 – Present', url: 'https://www.linkedin.com/company/iroute', place: 'Manta, Ecuador · Remote',\n        desc: \"I am the Solutions Architect at iRoute Solutions, where I lead projects within Banco Bolivariano's Software Factory: I drive management, technical design and delivery of enterprise solutions.\",\n        tags: ['Solutions architecture', 'Project management', 'Banking'] },\n      { role: 'Full Stack Developer', company: 'Bilbo S.A.', period: 'Nov 2020 – May 2024', url: 'https://www.linkedin.com/company/bilbosaec/', place: 'Ecuador · On-site',\n        desc: 'Software design and infrastructure. Built B-Connect, a process-automation system for a shrimp packing company.',\n        tags: ['Software design', 'Infrastructure', 'Automation'] },\n      { role: 'Software Engineer', company: 'Kmeleon', period: 'Jun 2019 – Nov 2022', url: 'https://www.linkedin.com/company/kmeleontech/', place: 'Miami, FL, USA · Remote',\n        desc: 'Full-stack development: requirements gathering, architecture and building of web applications (Oli) and the Rservi booking app.',\n        tags: ['Angular', 'Node.js', 'Azure', 'Serverless'] },\n      { role: 'Full Stack Developer (Freelance)', company: 'Independent', period: 'Jan 2018 – Present', url: '', place: 'Remote',\n        desc: 'Multiple projects and clients, from requirements gathering to deployment: EIDPA, PE Tecopesca, Bi-Talent, Shrimp, IdeaBot and IdeaSoft.',\n        tags: ['Full Stack', 'Multiple clients'] }\n    ];\n    const arr = this.state.lang === 'en' ? en : es;\n    return arr.map(function (e) { return Object.assign({}, e, { noUrl: !e.url }); });\n  }\n\n  projectsData() {\n    const es = [\n      { name: 'Banco Bolivariano', period: '2024 – hoy', desc: 'Líder de proyecto en la Fábrica de Software, dirigiendo el diseño y la entrega de soluciones bancarias.' },\n      { name: 'B-Connect', period: 'Bilbo S.A.', desc: 'Sistema de automatización de procesos para una empacadora de camarón.' },\n      { name: 'IdeaSoft', period: '2022 – 2023', desc: 'Web App para automatizar procesos de producción.' },\n      { name: 'IdeaBot', period: '2022', desc: 'Notificaciones, encuestas y promociones por WhatsApp.' },\n      { name: 'Bi-Talent', period: '2021', desc: 'Web App para la gestión de recursos humanos.' },\n      { name: 'EIDPA', period: '2018 – 2019', desc: 'Evaluación de desempeño del personal académico (ULEAM).' }\n    ];\n    const en = [\n      { name: 'Banco Bolivariano', period: '2024 – now', desc: 'Project lead in the Software Factory, driving the design and delivery of banking solutions.' },\n      { name: 'B-Connect', period: 'Bilbo S.A.', desc: 'Process-automation system for a shrimp packing company.' },\n      { name: 'IdeaSoft', period: '2022 – 2023', desc: 'Web app to automate production processes.' },\n      { name: 'IdeaBot', period: '2022', desc: 'Notifications, surveys and promotions via WhatsApp.' },\n      { name: 'Bi-Talent', period: '2021', desc: 'Web app for human-resources management.' },\n      { name: 'EIDPA', period: '2018 – 2019', desc: 'Academic staff performance evaluation (ULEAM).' }\n    ];\n    return this.state.lang === 'en' ? en : es;\n  }\n\n  skillsData() {\n    const en = this.state.lang === 'en';\n    return [\n      { label: 'Frontend', items: ['Angular', 'React', 'TypeScript', 'JavaScript'] },\n      { label: 'Backend', items: ['Node.js', 'Java'] },\n      { label: en ? 'Databases' : 'Bases de datos', items: ['MongoDB'] },\n      { label: 'Cloud & DevOps', items: ['AWS', 'Azure', 'Serverless', 'Logic Apps'] },\n      { label: en ? 'Methodologies' : 'Metodologías', items: ['Scrum', en ? 'Solutions Architecture' : 'Arquitectura de Soluciones', en ? 'Project Management' : 'Gestión de Proyectos'] }\n    ];\n  }\n\n  renderVals() {\n    const accent = this.props.accent ?? '#2A5BD7';\n    const t = this.dict();\n    const es =
